<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#94a3b8" stroke-opacity="0.14" stroke-width="1"/>
    </pattern>
    <radialGradient id="fade" cx="50%" cy="35%" r="70%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <mask id="mask">
      <rect width="1200" height="800" fill="url(#fade)"/>
    </mask>
  </defs>

  <rect width="1200" height="800" fill="url(#grid)" mask="url(#mask)"/>
</svg>
