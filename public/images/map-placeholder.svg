<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="700" viewBox="0 0 1600 700">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#0a0f1a"/>
    </linearGradient>
    <linearGradient id="grid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#a855f7" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="700" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="url(#grid)" stroke-width="1">
    <path d="M0 70H1600" opacity="0.35"/>
    <path d="M0 140H1600" opacity="0.25"/>
    <path d="M0 210H1600" opacity="0.2"/>
    <path d="M0 280H1600" opacity="0.18"/>
    <path d="M0 350H1600" opacity="0.16"/>
    <path d="M0 420H1600" opacity="0.14"/>
    <path d="M0 490H1600" opacity="0.12"/>
    <path d="M0 560H1600" opacity="0.1"/>
    <path d="M0 630H1600" opacity="0.08"/>

    <path d="M100 0V700" opacity="0.18"/>
    <path d="M250 0V700" opacity="0.14"/>
    <path d="M400 0V700" opacity="0.12"/>
    <path d="M550 0V700" opacity="0.1"/>
    <path d="M700 0V700" opacity="0.08"/>
    <path d="M850 0V700" opacity="0.08"/>
    <path d="M1000 0V700" opacity="0.1"/>
    <path d="M1150 0V700" opacity="0.12"/>
    <path d="M1300 0V700" opacity="0.14"/>
    <path d="M1450 0V700" opacity="0.18"/>
  </g>

  <!-- abstract "roads" -->
  <g fill="none" stroke="#94a3b8" stroke-opacity="0.25" stroke-width="10" stroke-linecap="round">
    <path d="M80 520 C 260 420, 380 460, 520 360 S 820 220, 980 300, 1210 210 S 1450 160, 1560 80"/>
    <path d="M60 120 C 240 200, 340 160, 520 240 S 760 360, 920 330, 1100 410 S 1340 560, 1540 520"/>
  </g>

  <!-- pin -->
  <g transform="translate(1040 310)" filter="url(#glow)">
    <path d="M0 -80c-44.2 0-80 35.8-80 80 0 64 80 160 80 160s80-96 80-160c0-44.2-35.8-80-80-80z" fill="#6366f1" fill-opacity="0.55"/>
    <circle cx="0" cy="0" r="28" fill="#0b1220" fill-opacity="0.85" stroke="#a855f7" stroke-opacity="0.75" stroke-width="6"/>
  </g>

  <!-- label -->
  <g transform="translate(1120 265)">
    <rect x="0" y="0" width="250" height="54" rx="16" fill="#0b1220" fill-opacity="0.7" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="18" y="34" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="20" fill="#e2e8f0" opacity="0.9">
      City highlight
    </text>
  </g>
</svg>
