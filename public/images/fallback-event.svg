      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.55" stop-color="#111a2f"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <radialGradient id="orb1" cx="30%" cy="35%" r="55%">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.35"/>
